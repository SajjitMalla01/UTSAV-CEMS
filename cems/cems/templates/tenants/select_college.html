{% extends 'base.html' %}
{% block title %}Select College{% endblock %}
{% block content %}
<div class="min-h-[calc(100vh-4rem)] bg-gray-50 flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 sm:p-8">
      <h1 class="text-2xl font-semibold text-gray-900 mb-6 text-center">Select your college</h1>
      
      <form method="POST">
        {% csrf_token %}
        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-700 mb-2">College</label>
          <div class="relative">
            <select name="college_id" required
              class="w-full appearance-none p-3 bg-white border border-gray-300 rounded-lg text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-brand focus:border-brand transition-colors cursor-pointer">
              <option value="">-- Select your college --</option>
              {% for college in colleges %}
                <option value="{{ college.id }}">{{ college.name }}</option>
              {% endfor %}
            </select>
            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-gray-500">
              <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
            </div>
          </div>
        </div>
        
        <button type="submit" class="w-full py-3 bg-brand text-white text-sm font-medium rounded-lg hover:bg-brand-dark transition-colors shadow-sm">
          Continue
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
