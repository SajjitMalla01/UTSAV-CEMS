{% extends 'base.html' %}
{% block title %}Resend Verification{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-4rem)] flex items-center justify-center bg-gray-50 px-4 py-12">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-semibold text-gray-900 mb-2">Resend Code</h1>
      <p class="text-gray-500 text-sm">Enter your email address and we'll send you a fresh verification code.</p>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 sm:p-8">
      <form method="post" action="{% url 'resend_verification' %}">
        {% csrf_token %}
        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Email Address</label>
          <input type="email" name="email" required autofocus
            placeholder="you@example.com"
            class="w-full p-2.5 bg-white border border-gray-300 rounded-lg text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-brand focus:border-brand transition-colors">
        </div>
        <button type="submit"
          class="w-full py-2.5 bg-brand text-white text-sm font-medium rounded-lg shadow-sm hover:bg-brand-dark transition-colors">
          Send new code
        </button>
      </form>

      <div class="mt-8 pt-6 border-t border-gray-100 flex flex-col items-center gap-2">
        <p class="text-sm text-gray-500">Already have a code? <a href="{% url 'verify_email' %}" class="font-medium text-brand hover:underline">Enter it here</a></p>
        <p class="text-sm text-gray-500">Remember your password? <a href="{% url 'login' %}" class="font-medium text-gray-900 hover:underline">Sign in</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
