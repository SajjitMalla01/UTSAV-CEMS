{% extends 'base.html' %}
{% load static %}
{% block title %}Sign in{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-3.5rem)] flex items-center justify-center bg-gray-50 px-4 py-12">
  <div class="w-full max-w-sm">

    <div class="mb-8 text-center">
      <h1 class="text-2xl font-semibold text-gray-900 mb-1">Sign in</h1>
      <p class="text-sm text-gray-500">Enter your credentials to access your account.</p>
    </div>

    <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-8">

      <form method="post" action="{% url 'login' %}" id="login-form" class="space-y-5">
        {% csrf_token %}

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5" for="id_username">Username</label>
          <input type="text" id="id_username" name="username" autocomplete="username" autofocus required
            placeholder="Your username"
            class="w-full px-3 py-2 bg-white border border-gray-300 rounded-lg text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent transition-all">
        </div>

        <div>
          <div class="flex justify-between items-center mb-1.5">
            <label class="text-sm font-medium text-gray-700" for="id_password">Password</label>
            <a href="#" class="text-sm text-brand hover:underline">Forgot password?</a>
          </div>
          <div class="relative">
            <input type="password" id="id_password" name="password" autocomplete="current-password" required
              placeholder="••••••••"
              class="w-full px-3 py-2 bg-white border border-gray-300 rounded-lg text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent transition-all pr-10">
            <button type="button" id="toggle-pw" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-colors">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
            </button>
          </div>
        </div>

        <button type="submit" id="login-btn"
          class="w-full px-4 py-2 text-sm font-medium text-white bg-brand hover:bg-brand-dark rounded-lg transition-colors">
          Log in
        </button>
      </form>

      <div class="mt-6 pt-6 border-t border-gray-100 space-y-4">
        <p class="text-sm text-gray-500 text-center">Don't have an account? <a href="{% url 'register' %}" class="font-medium text-brand hover:underline">Create account</a></p>

        <a href="{% url 'admin_gateway' %}" class="flex items-center justify-between px-4 py-3 bg-gray-50 hover:bg-gray-100 rounded-lg border border-gray-200 transition-colors group">
          <div class="flex items-center gap-3">
            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
            <div>
              <p class="text-sm font-medium text-gray-700">Admin sign in</p>
            </div>
          </div>
          <svg class="w-4 h-4 text-gray-400 group-hover:text-gray-600 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
  document.getElementById('toggle-pw').addEventListener('click', function () {
    const inp = document.getElementById('id_password');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  });
  document.getElementById('login-form').addEventListener('submit', function () {
    const btn = document.getElementById('login-btn');
    btn.textContent = 'Signing in…';
    btn.disabled = true;
  });
</script>
{% endblock %}
