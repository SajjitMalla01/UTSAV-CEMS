{% extends 'base.html' %}
{% block title %}Edit Profile{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 py-8">
  <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
    <div class="px-6 py-5 border-b border-gray-200 bg-gray-50">
      <h2 class="text-xl font-semibold text-gray-900">Edit Profile</h2>
      <p class="text-sm text-gray-500 mt-1">Update your personal information</p>
    </div>
    
    <form method="post" action="{% url 'profile_update' %}" class="p-6 sm:p-8 space-y-6">
      {% csrf_token %}
      
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">First Name</label>
          <input type="text" name="first_name" value="{{ user.first_name }}" class="w-full p-2.5 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand focus:border-brand outline-none transition-colors">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Last Name</label>
          <input type="text" name="last_name" value="{{ user.last_name }}" class="w-full p-2.5 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand focus:border-brand outline-none transition-colors">
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Email Address</label>
        <input type="email" name="email" value="{{ user.email }}" class="w-full p-2.5 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand focus:border-brand outline-none transition-colors">
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Department</label>
          <input type="text" name="department" value="{{ user.profile.department }}" class="w-full p-2.5 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand focus:border-brand outline-none transition-colors">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Phone</label>
          <input type="text" name="phone" value="{{ user.profile.phone }}" class="w-full p-2.5 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand focus:border-brand outline-none transition-colors">
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Biography</label>
        <textarea name="bio" rows="4" class="w-full p-2.5 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand focus:border-brand outline-none transition-colors">{{ user.profile.bio }}</textarea>
      </div>

      <div class="pt-6 border-t border-gray-100 flex gap-3 justify-end">
        <a href="{% url 'profile' %}" class="px-5 py-2.5 bg-white text-gray-700 text-sm font-medium border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">Cancel</a>
        <button type="submit" class="px-5 py-2.5 bg-brand text-white text-sm font-medium rounded-lg shadow-sm hover:bg-brand-dark transition-colors">Save Changes</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
