{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendance Scanner | UTSAV</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { light: '#eff6ff', DEFAULT: '#2563eb', dark: '#1d4ed8' }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <style>
    body { background-color: #f9fafb; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    .scanner-view { position: relative; overflow: hidden; border-radius: 1rem; background: #ffffff; border: 1px solid #e5e7eb; }
    .scanner-overlay { position: absolute; inset: 0; pointer-events: none; border: 4px solid rgba(0,0,0,0.02); z-index: 10; }
    .scan-region-highlight { border: 2px solid #2563eb !important; border-radius: 0.5rem !important; box-shadow: 0 0 0 4000px rgba(255,255,255,0.8) !important; }
    .scanning-line { position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: #2563eb; z-index: 15; animation: scanMove 2.5s infinite ease-in-out; }
    @keyframes scanMove { 0%, 100% { top: 15%; opacity: 0; } 50% { top: 85%; opacity: 1; } }
  </style>
</head>
<body class="min-h-screen flex flex-col text-gray-900">

  <header class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-lg bg-brand flex items-center justify-center font-bold text-lg text-white">U</div>
      <div>
        <h1 class="text-xl font-semibold leading-tight">Attendance Scanner</h1>
        <p class="text-xs text-gray-500">Scan QR tickets to verify registrations</p>
      </div>
    </div>
    <a href="{% url 'staff_dashboard' %}" class="px-4 py-2 bg-gray-50 text-gray-700 text-sm font-medium rounded-lg border border-gray-300 hover:bg-gray-100 transition-colors">Return to Dashboard</a>
  </header>

  <main class="flex-1 flex flex-col items-center justify-center p-6 gap-8">
    
    <!-- SCANNER CONTAINER -->
    <div class="w-full max-w-lg aspect-square scanner-view shadow-sm relative">
      <div id="reader" class="w-full h-full overflow-hidden"></div>
      <div class="scanner-overlay"></div>
      <div class="scanning-line hidden" id="scan-line"></div>
      
      <!-- Instructions Overlay -->
      <div id="scanner-instructions" class="absolute inset-0 z-20 flex flex-col items-center justify-center bg-white/95 backdrop-blur-sm p-8 text-center transition-opacity duration-300">
        <svg class="w-16 h-16 text-brand mb-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm14 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"/></svg>
        <h2 class="text-2xl font-semibold mb-2">Enable Camera</h2>
        <p class="text-sm text-gray-500 mb-8 max-w-xs">Please allow camera access to scan student registration QR codes.</p>
        <button onclick="startScanning()" class="px-6 py-2.5 bg-brand text-white text-sm font-medium rounded-lg hover:bg-brand-dark transition-colors">Start Scanner</button>
      </div>
    </div>

    <!-- STATUS PANEL -->
    <div class="w-full max-w-md bg-white rounded-xl p-6 text-center shadow-sm border border-gray-200">
      <div id="status-icon" class="w-12 h-12 rounded-full bg-gray-50 border border-gray-200 mx-auto flex items-center justify-center mb-4 text-gray-400">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      </div>
      <h3 id="status-text" class="text-lg font-semibold mb-1 text-gray-900">Awaiting Scan</h3>
      <p id="status-sub" class="text-sm text-gray-500">Position QR code within frame</p>
    </div>

  </main>

  <script>
    let html5QrCode = null;

    function startScanning() {
      document.getElementById('scanner-instructions').classList.add('opacity-0', 'pointer-events-none');
      document.getElementById('scan-line').classList.remove('hidden');
      document.getElementById('status-text').textContent = 'Camera Active';
      document.getElementById('status-icon').innerHTML = '<svg class="w-6 h-6 text-brand" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>';
      document.getElementById('status-icon').classList.replace('bg-gray-50', 'bg-brand-light');
      document.getElementById('status-icon').classList.replace('border-gray-200', 'border-blue-200');

      html5QrCode = new Html5Qrcode("reader");
      const config = { fps: 10, qrbox: { width: 250, height: 250 } };

      html5QrCode.start(
        { facingMode: "environment" }, 
        config, 
        onScanSuccess,
        onScanFailure
      ).catch(err => {
        console.error(err);
        document.getElementById('status-text').textContent = 'Camera Error';
        document.getElementById('status-sub').textContent = 'Could not start camera.';
        document.getElementById('scanner-instructions').classList.remove('opacity-0', 'pointer-events-none');
        document.getElementById('scan-line').classList.add('hidden');
      });
    }

    function onScanSuccess(decodedText, decodedResult) {
      if (html5QrCode) {
        html5QrCode.stop().then(() => {
          document.getElementById('status-icon').innerHTML = '<svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>';
          document.getElementById('status-icon').classList.replace('bg-brand-light', 'bg-green-50');
          document.getElementById('status-icon').classList.replace('border-blue-200', 'border-green-200');
          document.getElementById('status-text').textContent = 'QR Code Detected';
          document.getElementById('status-sub').textContent = 'Processing registration...';
          document.getElementById('scan-line').classList.add('hidden');
          
          if (decodedText.includes('/registrations/verify/')) {
            window.location.href = decodedText;
          } else {
            alert("Invalid QR Code: Not a recognized UTSAV ticket.");
            setTimeout(startScanning, 2000);
          }
        });
      }
    }

    function onScanFailure(error) {
      // Ignore background errors
    }
  </script>
</body>
</html>
